<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Solver</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="box">
        <h1>Math Solver</h1>
        <p>Writea question like 2+2 or 6/3</p>

        <input type="text" id="mahtInput" placeholder="Write here...">

        <div id="resultBox">

        </div>

        <div class="history-section">

            <ul id="historyList">

            </ul>
        </div>

    </div>
    <script src="./script.js"></script>
</body>
</html>
